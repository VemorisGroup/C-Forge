name: CI multiplataforma

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  portable:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Prueba portable
        shell: bash
        run: |
          python cforgev.py --version
          python cforgev.py ejemplos/hola.cfv
      - name: Suite completa Unix
        if: runner.os != 'Windows'
        run: python -m unittest discover -s tests -v
