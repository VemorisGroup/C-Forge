name: Publicar paquetes

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  archives:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Construir archivo portable
        shell: bash
        run: python packaging/build_portable.py --version "${GITHUB_REF_NAME#v}" --platform "${{ matrix.platform }}"
      - name: Construir ejecutable autónomo para Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m pip install pyinstaller
          pyinstaller --onefile --name "cforge-${GITHUB_REF_NAME#v}-windows-x64" \
            --hidden-import compilador_nativo --hidden-import compilador_wasm cforgev.py
      - uses: actions/upload-artifact@v4
        with:
          name: cforgev-${{ matrix.platform }}
          path: dist/*

  debian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Construir paquete Debian
        run: bash packaging/debian/build-deb.sh "${GITHUB_REF_NAME#v}" all
      - uses: actions/upload-artifact@v4
        with:
          name: cforgev-debian
          path: dist/*.deb

  release:
    needs: [archives, debian]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generar manifiestos de gestores de paquetes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" -o source.tar.gz
          python packaging/homebrew/generate.py "$VERSION" source.tar.gz -o release-assets/cforgev.rb
          python packaging/winget/generate.py "$VERSION" "release-assets/cforge-${VERSION}-windows-x64.exe" -o release-assets/VemorisGroup.CForgev.yaml
      - name: Crear GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --generate-notes --title "C-Forgev $GITHUB_REF_NAME"
